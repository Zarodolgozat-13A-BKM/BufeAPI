apiVersion: apps/v1
kind: Deployment
metadata:
  name: bufe-api-deployment
spec:
  selector:
    matchLabels:
      app: bufe-api
  template:
    metadata:
      labels:
        app: bufe-api
    spec:
      imagePullSecrets:
        - name: ghcr-login-secret
      containers:
        - name: bufe-api
          # image: ghcr.io/milanmarko/laravel-app:latest
          # image: cr.jedlik.cloud/mm-bufeapi:latest
          image: ghcr.io/milanmarko/zarodolgozat-bufe-api
          imagePullPolicy: Always

          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: bufeapi-laravelapp-config
            - secretRef:
                name: bufeapi-laravelapp-secret

---
apiVersion: v1
kind: Service
metadata:
  name: bufe-api-cluster-ip-service
spec:
  selector:
    app: bufe-api
  type: ClusterIP
  ports:
    - protocol: TCP
      targetPort: 8000
      port: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bufe-api-ingress
spec:
  ingressClassName: nginx

  rules:
    - host: bufeapi-markomilan.jcloud.jedlik.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bufe-api-cluster-ip-service
                port:
                  number: 80
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bufeapi-laravelapp-config
data:
  APP_URL: "http://bufeapi-markomilan.jcloud.jedlik.cloud"
  APP_NAME: "BufeAPI"
  APP_ENV: "production"
  APP_DEBUG: "false"
  DB_CONNECTION: "mysql"
  DB_USERNAME: "marko.milan"
  DB_HOST: "jcloud02.jedlik.eu"
  DB_DATABASE: "marko_milan_db_2"
  DB_PORT: "3306"
  LDAP_CACHE: "false"
  LDAP_LOGGING: "false"
  LDAP_CONNECTION: "default"
  LDAP_HOST: "jdc.jedlik.eu"
  LDAP_USERNAME: "cn=Vendég,ou=Idegen,dc=jedlik,dc=helyi"
  LDAP_PORT: "389"
  LDAP_BASE_DN: "dc=jedlik,dc=helyi"
  LDAP_TIMEOUT: "5"
  LDAP_SSL: "false"
  LDAP_TLS: "false"
  LDAP_SASL: "false"
  SESSION_DRIVER: "database"
  SESSION_LIFETIME: "120"
  SESSION_ENCRYPT: "false"
  SESSION_PATH: "/"
  SESSION_DOMAIN: "null"
